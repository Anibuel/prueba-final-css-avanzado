<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <title>Anibal Page</title>
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <div class="logo">Anibal Gallery</div>

        <ul>
          <li><a href="#inicio">Inicio</a></li>
          <li><a href="#maiale">Maiale Vif</a></li>
          <li><a href="#tridove">Trídove</a></li>
          <li><a href="#contacto">Contacto</a></li>
        </ul>
      </aside>

      <main>
        <section id="inicio">
          <div class="presentacion">
            <h1>Bienvenidos a mi Portafolio Musical</h1>
            <p>
              Aquí podrás encontrar mis últimos trabajos como guitarrista,
              vocalista y productor
            </p>
          </div>
        </section>

        <div class="bandas">
          <section id="maiale">
            <h2>Maiale Vif</h2>

            <div class="galeria">
              <div class="card">
                <figure class="contenedor-imagen">
                  <img
                    src="./assets/images/MAIALE-VIF (2).jpg"
                    alt="Maiale Vif 1"
                  />
                </figure>
              </div>

              <div class="card">
                <figure class="contenedor-imagen">
                  <img
                    src="./assets/images/MAIALE-VIF (4).jpg"
                    alt="Maiale Vif 2"
                  />
                </figure>
              </div>

              <div class="card">
                <figure class="contenedor-imagen">
                  <img
                    src="./assets/images/MAIALE-VIF (1).jpg"
                    alt="Maiale Vif 3"
                  />
                </figure>
              </div>
            </div>
          </section>

          <section id="tridove">
            <h2>Trídove</h2>

            <div class="galeria">
              <div class="card">
                <figure class="contenedor-imagen">
                  <img src="./assets/images/TRIDOVE (2).jpg" alt="Trídove 1" />
                </figure>
              </div>

              <div class="card">
                <figure class="contenedor-imagen">
                  <img src="./assets/images/TRIDOVE (6).jpg" alt="Trídove 2" />
                </figure>
              </div>

              <div class="card">
                <figure class="contenedor-imagen">
                  <img src="./assets/images/TRIDOVE (1).jpg" alt="Trídove 3" />
                </figure>
              </div>
            </div>
          </section>
        </div>
      </main>

      <footer section id="contacto">
        <h2>Contacto</h2>
        <div class="redes">
          <p>Instagram</p>
          <p>Facebook</p>
          <p>Email</p>
        </div>
      </footer>
    </div>
  </body>
</html>
